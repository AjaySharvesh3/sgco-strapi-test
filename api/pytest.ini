[pytest]
testpaths = .
addopts = -v -ra --tb=short
markers =
    signup: signup flow tests
    signin: signin flow tests
    buy_course: buy course / orders tests
    account: account creation, forgot-username, forgot-password, admin user updates
    discount: discount-code CRUD and lifecycle tests
    group_subscription: center / center-user / group-subscription tests
    class_access: class progress, scorm, quiz, certificate, repeat-class tests
    graduate_report: graduate report data-source (discount hourly_rate) tests
    about_us_page: about-us-page CRUD tests
    activity_response: activity-response CRUD tests
    announcement: announcement CRUD tests
    app_configuration: app-configuration single-type tests
    authorize_api: authorize-api single-type sensitive tests
    author: author CRUD tests
    carousal_image: carousal-image CRUD tests
    category: category CRUD tests
    cda: cda CRUD tests
    certificate_partner: certificate-partner CRUD tests
    chat_widget_control: chat-widget-control CRUD tests
    childcare_landing: childcare-training-landing-page CRUD tests
    course_audio: course-audio CRUD tests
    course_search: course-search CRUD tests
    course_state: course-state CRUD tests
    course_state_fee: course-state-fee CRUD tests
    batch_crud: parametrized default-CRUD coverage across many APIs
    course: course CRUD + filtering + permissions tests
    course_feedback: course-feedback CRUD + auth/IDOR tests
    error_log: error-log CRUD + sensitive-data tests
    error_report: error-report CRUD + sensitive-data tests
    single_type: parametrized single-type API tests
    custom_auth: custom-auth endpoint tests
    order: order CRUD + payment-data isolation tests
    progress: progress CRUD + per-user isolation tests
    scorm_progress: scorm-progress CRUD + sensitive-data tests
    subscription_account: subscription-account CRUD + billing isolation
    certificate: certificate CRUD + sensitive-data tests
    support_chat_content: support-chat-content (admin-only route) tests
    profile: profile auth/IDOR tests
    subscription: subscription unauth + scope tests
    subscription_order: subscription-order unauth tests
    order_item: order-item unauth tests
