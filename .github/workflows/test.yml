name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # for the "pytest results" check run
  pull-requests: write   # for the PR summary comment

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install Python deps
        working-directory: api
        run: pip install -r requirements.txt

      - name: Run pytest
        id: pytest
        working-directory: api
        # Don't fail the workflow at this step — we want the publish step to
        # always run so failures are visible inline on the PR. The job
        # re-raises the failure at the end after the report is published.
        continue-on-error: true
        env:
          STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_APP_API_URL: ${{ secrets.NEXT_APP_API_URL }}
          TEST_COURSE_ID: ${{ vars.TEST_COURSE_ID }}
          TEST_COURSE_FEE: ${{ vars.TEST_COURSE_FEE }}
          TEST_CARD_NUMBER: "4111111111111111"
          TEST_CARD_EXP_MONTH: "12"
          TEST_CARD_EXP_YEAR: "2034"
          TEST_CARD_CVV: "123"
          TEST_ZIP_CODE: "10001"
        run: |
          mkdir -p ../results
          pytest \
            --junitxml=../results/junit.xml \
            --html=../results/report.html --self-contained-html \
            --tb=short || true

      - name: Publish pytest results on the PR
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: results/junit.xml
          check_name: pytest results
          fail_on_failure: true
          require_tests: true
          detailed_summary: true
          include_passed: false   # only annotate failures (signal not noise)
          annotate_only: false

      - name: Upload pytest report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.sha }}
          path: results/
          retention-days: 30

      - name: Re-raise test failure on the workflow itself
        if: steps.pytest.outcome != 'success'
        run: |
          echo "::error::pytest failed - see annotations above or download artifact 'pytest-report-${{ github.sha }}'"
          exit 1
